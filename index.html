<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A premium Pinterest-like wallpaper gallery engine to browse, preview, search, download, and favorite high-quality wallpapers.">
  <meta name="keywords" content="wallpapers, anime wallpapers, desktop background, pinterest grid, masonry layout, raw github, images, gifs">
  <title>AeroPaper | Premium Pinterest Wallpaper Gallery</title>
  
  <!-- Google Fonts (Outfit & Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Loading Splash Screen -->
  <div id="splash-screen" class="splash-screen">
    <div class="splash-logo">
      <i class="fas fa-wind logo-icon"></i>
      <span class="splash-title">AeroPaper</span>
    </div>
    <div class="splash-loader-bar">
      <div id="splash-progress" class="splash-loader-progress"></div>
    </div>
  </div>

  <div class="app-container">
    <!-- Sticky Glassmorphic Header -->
    <header>
      <a href="#" class="logo-container" id="logo-link">
        <i class="fas fa-wind logo-icon"></i>
        <span class="logo-text">AeroPaper</span>
      </a>
      
      <!-- Interactive Search Container -->
      <div class="search-container">
        <i class="fas fa-search search-icon"></i>
        <input 
          type="text" 
          id="search-input" 
          class="search-input" 
          placeholder="Search wallpapers, tags, categories, extensions..."
          autocomplete="off"
        />
      </div>
      
      <!-- Action Controls -->
      <div class="header-actions">
        <button id="surprise-btn" class="nav-btn surprise-btn" title="Surprise Me (Random Wallpaper)">
          <i class="fas fa-random"></i> <span>Surprise Me</span>
        </button>
        <!-- Grid Density Control -->
        <div class="density-selector">
          <button class="density-btn" data-density="lg" title="Large Grid"><i class="fas fa-th-large"></i></button>
          <button class="density-btn active" data-density="md" title="Medium Grid"><i class="fas fa-th"></i></button>
          <button class="density-btn" data-density="sm" title="Small Grid"><i class="fas fa-grip-horizontal"></i></button>
        </div>
        <button id="explore-tab" class="nav-btn active">
          <i class="fas fa-compass"></i> <span>Explore</span>
        </button>
        <button id="liked-tab" class="nav-btn">
          <i class="fas fa-heart"></i> <span>Liked</span>
        </button>
        <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">
          <i class="fas fa-sun"></i>
        </button>
      </div>
    </header>
    
    <!-- Main Content Area -->
    <main>
      <!-- Filter controls and status -->
      <div class="filter-section">
        <!-- Categories filter -->
        <div class="filter-row">
          <span class="filter-label">Folder</span>
          <div id="category-pills" class="filter-pills">
            <!-- Dynamic Category Pills -->
          </div>
        </div>
        
        <!-- Formats filter -->
        <div class="filter-row">
          <span class="filter-label">Format</span>
          <div id="format-pills" class="filter-pills">
            <!-- Dynamic Format Pills -->
          </div>
        </div>

        <!-- Custom Boards filter -->
        <div class="filter-row" id="boards-filter-row" style="display: none;">
          <span class="filter-label">My Boards</span>
          <div id="board-pills" class="filter-pills">
            <!-- Dynamic Board Pills -->
          </div>
        </div>
        
        <!-- Wallpaper Stats & Actions -->
        <div class="stats-actions-row">
          <div class="stat-pills">
            <span>Found: <strong id="view-count">0</strong> wallpapers</span>
            <span>Database: <strong id="total-count">0</strong> total</span>
          </div>
          <div class="layout-controls-right">
            <select id="sort-select" class="sort-select" title="Sort Wallpapers">
              <option value="default">Default Order</option>
              <option value="name-asc">Name (A - Z)</option>
              <option value="name-desc">Name (Z - A)</option>
              <option value="size-asc">Size (Smallest)</option>
              <option value="size-desc">Size (Largest)</option>
            </select>
            <button id="slideshow-trigger" class="nav-btn surprise-btn" style="padding: 0.5rem 1rem; font-size: 0.85rem;" title="Start Slideshow Autoplay">
              <i class="fas fa-play"></i> Slideshow
            </button>
          </div>
        </div>
      </div>
      
      <!-- Dynamic Masonry Layout Container -->
      <div class="masonry-container">
        <div id="masonry-grid" class="masonry-grid">
          <!-- Dynamically filled with wallpaper items -->
        </div>
      </div>
    </main>

    <!-- Branded Footer -->
    <footer>
      <div class="footer-content">
        <div class="footer-logo">
          <i class="fas fa-wind"></i> AeroPaper
        </div>
        <div class="footer-credits">
          Made with 💜 by <a href="https://wondermayank.in" target="_blank" rel="noopener">wondermayank</a>
        </div>
        <div style="font-size: 0.8rem; opacity: 0.6; margin-top: 0.25rem;">
          © 2026 AeroPaper.
        </div>
      </div>
    </footer>
  </div>
  
  <!-- Immersive Lightbox Modal -->
  <div id="lightbox" class="lightbox">
    <div class="lightbox-content">
      <!-- Close button -->
      <button id="lightbox-close" class="lightbox-close" title="Close Preview">
        <i class="fas fa-times"></i>
      </button>
      
      <!-- Lightbox Media Section -->
      <div id="lightbox-media" class="lightbox-media">
        <img class="lightbox-img" src="" alt="" />
        <div id="canvas-container" class="lightbox-canvas-container">
          <canvas id="editor-canvas"></canvas>
          <div id="crop-guide" class="crop-guide"></div>
        </div>
      </div>
      
      <!-- Lightbox Detail Section -->
      <div class="lightbox-details" style="overflow-y: auto; max-height: 100%;">
        <div class="detail-header" style="margin-bottom: 1rem;">
          <span class="detail-category">Anime Wallpapers</span>
          <h2 class="detail-title">Wallpaper Title</h2>
          
          <div class="info-grid">
            <div class="info-card">
              <div class="info-label">Format</div>
              <div class="info-value" id="info-format">-</div>
            </div>
            <div class="info-card">
              <div class="info-label">File Size</div>
              <div class="info-value" id="info-size">-</div>
            </div>
            <div class="info-card" style="grid-column: span 2;">
              <div class="info-label">File Path</div>
              <div class="info-value" id="info-path" style="word-break: break-all; font-family: monospace; font-size: 0.8rem; font-weight: normal;">-</div>
            </div>
          </div>
          
          <!-- Board select container -->
          <div class="board-select-container">
            <select id="board-select" class="board-select">
              <option value="">-- Add to Board --</option>
              <option value="Favorites">Liked Wallpapers</option>
            </select>
            <button id="board-create-btn" class="board-add-btn" title="Create New Board">
              <i class="fas fa-plus"></i>
            </button>
          </div>
        </div>
        
        <!-- Editor Toggle & Panel -->
        <div class="editor-toggle-container">
          <button id="editor-toggle-btn" class="action-btn secondary-btn" style="padding: 0.6rem 1rem; font-size: 0.85rem; border-radius: 10px; width: 100%;">
            <i class="fas fa-magic"></i> Edit Wallpaper (Crop & Blur)
          </button>
        </div>
        
        <div id="editor-panel" class="editor-panel">
          <div class="slider-control">
            <div class="slider-header">
              <span>Gaussian Blur</span>
              <strong id="blur-val">0px</strong>
            </div>
            <input type="range" id="blur-slider" class="slider-input" min="0" max="40" value="0" />
          </div>

          <div class="slider-control" id="pan-control" style="display: none;">
            <div class="slider-header">
              <span id="pan-label">Crop Position Pan</span>
              <strong id="pan-val">50%</strong>
            </div>
            <input type="range" id="pan-slider" class="slider-input" min="0" max="100" value="50" />
          </div>
          
          <div class="aspect-ratio-control">
            <div class="editor-section-title">Aspect Ratio Crop</div>
            <div class="aspect-ratio-selector" style="margin-bottom: 0.8rem;">
              <button class="ratio-btn active" data-ratio="free">Free</button>
              <button class="ratio-btn" data-ratio="1:1">1:1</button>
              <button class="ratio-btn" data-ratio="16:9">16:9</button>
              <button class="ratio-btn" data-ratio="9:16">9:16 (Phone)</button>
            </div>

            <!-- Blurred Fit checkbox toggle -->
            <label class="checkbox-control" id="blur-fit-container" style="display: none;">
              <input type="checkbox" id="blur-fit-checkbox" />
              <span>Blurred Fit (Show PC wallpaper in phone with blur background)</span>
            </label>
          </div>
        </div>
        
        <div class="detail-actions">
          <button id="lightbox-download" class="action-btn primary-btn">
            <i class="fas fa-arrow-down"></i> Download Wallpaper
          </button>
          <button id="lightbox-like" class="action-btn secondary-btn">
            <i class="far fa-heart"></i> Favorite
          </button>
          <button id="lightbox-slideshow" class="action-btn secondary-btn lightbox-slideshow-btn" title="Start slideshow from this wallpaper">
            <i class="fas fa-play"></i> Slideshow
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Fullscreen Slideshow Overlay -->
  <div id="slideshow-overlay" class="slideshow-overlay">
    <div class="slideshow-progress-bar" id="slideshow-progress"></div>
    <div class="slideshow-img-container">
      <img id="slideshow-img" class="slideshow-img" src="" alt="" />
    </div>
    <div class="slideshow-controls">
      <button id="slideshow-prev" class="slideshow-btn" title="Previous (Arrow Left)"><i class="fas fa-chevron-left"></i></button>
      <button id="slideshow-play" class="slideshow-btn" title="Play/Pause (Space)"><i class="fas fa-pause"></i></button>
      <button id="slideshow-next" class="slideshow-btn" title="Next (Arrow Right)"><i class="fas fa-chevron-right"></i></button>
      <button id="slideshow-close" class="slideshow-btn close-btn" title="Close Slideshow (Esc)"><i class="fas fa-times"></i></button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="database.js"></script>
  <script src="app.js"></script>
</body>
</html>
